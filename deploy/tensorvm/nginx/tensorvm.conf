# Replace example hostnames and certificate paths before installing.
upstream tensorvm_service {
    server 127.0.0.1:8545;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name rpc.example.test explorer.example.test faucet.example.test telemetry.example.test;

    ssl_certificate /etc/letsencrypt/live/tensorvm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tensorvm/privkey.pem;

    client_max_body_size 2m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_pass http://tensorvm_service;
    }
}

server {
    listen 80;
    server_name rpc.example.test explorer.example.test faucet.example.test telemetry.example.test;
    return 301 https://$host$request_uri;
}
